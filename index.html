<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fadaka Blockchain</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: #f9f9f9;
      color: #333;
    }
    h1, h3 {
      text-align: center;
      color: #2c3e50;
    }
    button {
      padding: 10px 20px;
      margin: 5px 0;
      cursor: pointer;
      border: none;
      background-color: #3498db;
      color: white;
      font-size: 1em;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #2980b9;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 1em;
    }
    #log {
      background: #222;
      color: #eee;
      padding: 15px;
      height: 150px;
      overflow-y: auto;
      border-radius: 5px;
      font-family: monospace;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Fadaka Blockchain Wallet</h1>

  <button id="connectBtn">Connect Wallet</button>
  <button id="disconnectBtn" disabled>Disconnect Wallet</button>

  <div id="walletInfo" style="display:none;">
    <p><strong>Address:</strong> <span id="address"></span></p>
    <p><strong>Balance:</strong> <span id="balance">0</span> FAD</p>

    <h3>Send FAD</h3>
    <label for="toAddress">To Address:</label>
    <input type="text" id="toAddress" placeholder="0x..." />
    
    <label for="amount">Amount:</label>
    <input type="number" id="amount" min="0" step="0.01" placeholder="Amount to send" />

    <button id="sendBtn">Send</button>

    <h3>Swap FAD</h3>
    <label for="swapAmount">Amount to Swap:</label>
    <input type="number" id="swapAmount" min="0" step="0.01" placeholder="FAD amount to swap" />
    <button id="swapBtn">Swap</button>
  </div>

  <div id="log"></div>

<script>
  const fadakaABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address to, uint amount) returns (bool)",
    "function swap(uint amount) returns (bool)"
  ];

  const fadakaAddress = "0xF3b4902b1eAC3223cD109aeB7369fEEE60056FfE";

  let provider, signer, contract;

  const connectBtn = document.getElementById("connectBtn");
  const disconnectBtn = document.getElementById("disconnectBtn");
  const walletInfo = document.getElementById("walletInfo");
  const addressSpan = document.getElementById("address");
  const balanceSpan = document.getElementById("balance");
  const toAddressInput = document.getElementById("toAddress");
  const amountInput = document.getElementById("amount");
  const swapAmountInput = document.getElementById("swapAmount");
  const sendBtn = document.getElementById("sendBtn");
  const swapBtn = document.getElementById("swapBtn");
  const logDiv = document.getElementById("log");

  function log(message) {
    const p = document.createElement("p");
    p.textContent = message;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function connectWallet() {
    if (!window.ethereum) {
      alert("MetaMask or another Ethereum wallet is required.");
      return;
    }
    try {
      await ethereum.request({ method: "eth_requestAccounts" });
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      const userAddress = await signer.getAddress();
      addressSpan.textContent = userAddress;
      contract = new ethers.Contract(fadakaAddress, fadakaABI, signer);

      walletInfo.style.display = "block";
      connectBtn.disabled = true;
      disconnectBtn.disabled = false;

      await updateBalance();
      log("Wallet connected: " + userAddress);
    } catch (err) {
      log("Connection failed: " + err.message);
    }
  }

  async function disconnectWallet() {
    provider = null;
    signer = null;
    contract = null;
    addressSpan.textContent = "";
    balanceSpan.textContent = "0";
    walletInfo.style.display = "none";
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
    log("Wallet disconnected");
  }

  async function updateBalance() {
    try {
      const address = await signer.getAddress();
      const rawBalance = await contract.balanceOf(address);
      const decimals = await contract.decimals();
      const balance = ethers.utils.formatUnits(rawBalance, decimals);
      balanceSpan.textContent = balance;
    } catch (err) {
      log("Balance error: " + err.message);
    }
  }

  async function sendTokens() {
    try {
      const to = toAddressInput.value.trim();
      const amount = amountInput.value.trim();
      if (!ethers.utils.isAddress(to)) return alert("Invalid address");
      if (!amount || isNaN(amount) || Number(amount) <= 0) return alert("Enter valid amount");

      const decimals = await contract.decimals();
      const parsedAmount = ethers.utils.parseUnits(amount, decimals);

      log(`Sending ${amount} FAD to ${to}...`);
      const tx = await contract.transfer(to, parsedAmount);
      await tx.wait();
      log("Transfer complete: " + tx.hash);
      await updateBalance();
    } catch (err) {
      log("Send failed: " + err.message);
    }
  }

  async function swapTokens() {
    try {
      const amount = swapAmountInput.value.trim();
      if (!amount || isNaN(amount) || Number(amount) <= 0) return alert("Enter valid swap amount");

      const decimals = await contract.decimals();
      const parsedAmount = ethers.utils.parseUnits(amount, decimals);

      log(`Swapping ${amount} FAD...`);
      const tx = await contract.swap(parsedAmount);
      await tx.wait();
      log("Swap complete: " + tx.hash);
      await updateBalance();
    } catch (err) {
      log("Swap failed: " + err.message);
    }
  }

  connectBtn.onclick = connectWallet;
  disconnectBtn.onclick = disconnectWallet;
  sendBtn.onclick = sendTokens;
  swapBtn.onclick = swapTokens;
</script>

<!-- Ethers.js CDN -->
<script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>

</body>
</html>
